<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600&amp;display=swap');
    </style>

    <!-- Heartbeat line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0"/>
      <stop offset="20%" stop-color="#5eead4" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#5eead4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </linearGradient>

    <!-- Animated trace pulse -->
    <linearGradient id="traceGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0">
        <animate attributeName="stop-opacity" values="0;0.9;0" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.9">
        <animate attributeName="stop-opacity" values="0.9;0;0.9" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#0f172a" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.035" stroke="#5eead4" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Heartbeat line (background decoration) -->
  <polyline
    points="0,140 100,140 150,140 180,95 210,175 240,65 270,160 300,110 330,140 450,140 800,140"
    fill="none"
    stroke="url(#lineGrad)"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.35"
  />

  <!-- Animated trace pulse -->
  <polyline
    points="0,140 100,140 150,140 180,95 210,175 240,65 270,160 300,110 330,140 450,140 800,140"
    fill="none"
    stroke="url(#traceGrad)"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-dasharray="120 680"
    opacity="0.6"
  >
    <animate attributeName="stroke-dashoffset" values="800;-800" dur="4s" repeatCount="indefinite"/>
  </polyline>

  <!--
    LOGO — exact replica of Logo.tsx
    lucide Activity icon: polyline points="22 12 18 12 15 21 9 3 6 12 2 12"
    white, strokeWidth 2.5
    gap-2.5 (10px at 20px, scaled proportionally)
    Text: Sora, semibold (600), tracking-tight (-0.025em), white
  -->

  <!-- Activity icon — scaled 1.4x, white, no effects -->
  <g transform="translate(295, 56) scale(1.4)">
    <polyline
      points="22 12 18 12 15 21 9 3 6 12 2 12"
      fill="none"
      stroke="white"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- "Curalink" — Sora 600, white, tracking-tight, no glow -->
  <text x="340" y="84" text-anchor="start" font-family="Sora, 'Segoe UI', system-ui, sans-serif" font-weight="600" font-size="36" fill="white" letter-spacing="-0.9">Curalink</text>

  <!-- Subtitle -->
  <text x="400" y="168" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="13" fill="#94a3b8" letter-spacing="5">
    AI MEDICAL RESEARCH ASSISTANT
  </text>

  <!-- Corner accents -->
  <line x1="20" y1="20" x2="55" y2="20" stroke="#5eead4" stroke-width="1" opacity="0.25"/>
  <line x1="20" y1="20" x2="20" y2="45" stroke="#5eead4" stroke-width="1" opacity="0.25"/>
  <line x1="745" y1="180" x2="780" y2="180" stroke="#818cf8" stroke-width="1" opacity="0.25"/>
  <line x1="780" y1="155" x2="780" y2="180" stroke="#818cf8" stroke-width="1" opacity="0.25"/>

  <!-- Pulsing dots -->
  <circle cx="55" cy="140" r="2" fill="#5eead4" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="745" cy="140" r="2" fill="#818cf8" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
</svg>
